# Stack: tldraw widget (HTTP 3000, WS 4000) + Bedrock agent.
#
# Local compose runs the agent as plain "python -m main" (see agent.command below) to avoid
# opentelemetry-instrument + Bedrock streaming KeyError and OTLP noise to localhost:4318.
# The image Dockerfile.agent still defaults to opentelemetry-instrument for other deploys.
#
# From repo root:
#   docker compose build
#   docker compose up
#
# AWS credentials (choose one):
#   - Add .env beside this file: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (optional AWS_SESSION_TOKEN).
#   - Or uncomment volumes on agent and mount your host profile (path differs on Windows vs Linux/Mac).

services:
  tldraw-widget:
    build:
      context: ./app/tldraw_service
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "4000:4000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    # Overrides Dockerfile CMD: no OTel auto-instrumentation (fixes Strands+Bedrock stream + no collector on :4318).
    command: ["python", "-m", "main"]
    ports:
      - "8000:8000"
      - "8080:8080"
      - "9000:9000"
    depends_on:
      tldraw-widget:
        condition: service_healthy
    environment:
      TLDRAW_MCP_ROOT: /workspace/app/tldraw_service
      REQUIRE_TLDRAW_DIST: "1"
      TLDRAW_WS_URL: ws://tldraw-widget:4000
      TLDRAW_UI_URL: http://localhost:3000
      AWS_REGION: eu-central-1
      AWS_DEFAULT_REGION: eu-central-1
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    # volumes:
    #   - ${USERPROFILE}/.aws:/home/bedrock_agentcore/.aws:ro
