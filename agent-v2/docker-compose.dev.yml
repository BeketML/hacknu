services:
  # ── Python FastAPI backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent_v2_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env          # GOOGLE_API_KEY, ANTHROPIC_API_KEY, etc.
    environment:
      # Override or add extra env vars here without touching .env
      PYTHONUNBUFFERED: "1"
    volumes:
      # Persist generated files / context between restarts
      - backend_data:/app/data
    ports:
      - "8000:8000"             # expose for direct debug access (optional)
    networks:
      - agent_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Vite SPA served via nginx ─────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: agent_v2_web
    restart: unless-stopped
    ports:
      - "3000:80"               # visit http://localhost:3000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - agent_net

volumes:
  backend_data:

networks:
  agent_net:
    driver: bridge
